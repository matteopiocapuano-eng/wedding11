<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matteo & Daniela — 11 Agosto 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f2;--bg2:#f2ede4;--bg3:#1a2e3d;
  --ink:#1a2e3d;--ink2:#2e5068;--ink3:#8aacbf;
  --accent:#5bafd6;--accent2:#3a90b8;
  --border:#ddd6c8;--white:#fdf9f4;--danger:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden;}

/* ═══ NAV ═══ */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bg);padding:1rem;display:flex;justify-content:center;border-bottom:1px solid var(--border);}
/* ... Aggiungi qui il resto dei tuoi stili originali ... */

.show { display: block !important; }
</style>
</head>
<body>

<nav>
  <a href="#home">Home</a>
  <a href="#rsvp">RSVP</a>
</nav>

<section id="rsvp">
  <form id="rsvp-form">
    <input type="text" name="nome" placeholder="Nome" required>
    <input type="text" name="cognome" placeholder="Cognome" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="presenza" placeholder="Partecipazione (si/no)" required>
    
    <button type="submit" id="submit-btn">Invia conferma</button>
  </form>

  <div id="success-box" style="display:none;">
    <h3>Grazie!</h3>
    <p id="success-detail"></p>
  </div>
</section>

<script>
// 1. CONFIGURAZIONE: INCOLLA QUI IL TUO URL DI GOOGLE APPS SCRIPT
const GAS_URL = "https://script.google.com/macros/s/AKfycbwPbQj1Mhc8G9ZusdeVcQ0g_g_HkcdVvAB55mgTh5vgYFr1BHmI0jgVs2-zQvDx8a2q/exec";

// 2. LOGICA ROBUSTA DI INVIO
async function submitRSVP(event) {
  event.preventDefault();
  
  const form = document.getElementById("rsvp-form");
  const btn = document.getElementById("submit-btn");
  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());
  
  // UI Loading State
  btn.disabled = true;
  btn.textContent = "Invio in corso...";

  let success = false;
  let attempts = 0;
  const maxAttempts = 3;

  // Ciclo di tentativi (Retry)
  while (attempts < maxAttempts && !success) {
    try {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        const result = await response.json();
        // Controllo successo reale
        if (result.success) {
          success = true;
        } else {
          console.error("Errore lato server:", result.message);
        }
      }
    } catch (err) {
      console.error(`Tentativo ${attempts + 1} fallito:`, err);
    }
    
    attempts++;
    // Attesa tra i tentativi in caso di rete instabile
    if (!success && attempts < maxAttempts) {
      await new Promise(resolve => setTimeout(resolve, 1500));
    }
  }

  // Risultato finale
  if (success) {
    // UI Success
    const detail = document.getElementById("success-detail");
    if (detail) {
        detail.innerHTML = `<strong>${data.nome} ${data.cognome}</strong><br>
                            Partecipa: ${data.presenza === "si" ? "✅ Sì" : "❌ No"}`;
    }
    document.getElementById("rsvp-form").style.display = "none";
    document.getElementById("success-box").classList.add("show");
  } else {
    // UI Error
    alert("Errore nell'invio dopo 3 tentativi. Controlla la connessione e riprova.");
    btn.disabled = false;
    btn.textContent = "Invia conferma";
  }
}

// Associazione evento
document.getElementById("rsvp-form").addEventListener("submit", submitRSVP);

// COPIA IBAN (Mantenuta dal tuo codice originale)
function copyIban(){
  navigator.clipboard.writeText("IT60R0538701607000003654879").then(()=>{
    const btn=document.getElementById("copy-btn");
    if(btn) {
        btn.textContent="Copiato!";
        setTimeout(()=>btn.textContent="Copia IBAN", 2000);
    }
  });
}
</script>

</body>
</html>
